# Include this inside your server block:
# include /etc/nginx/snippets/siinv-security.conf;

# Burst control for auth and API
limit_req_zone $binary_remote_addr zone=siinv_auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=siinv_api_zone:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=siinv_conn_zone:10m;

# Connection caps per IP
limit_conn siinv_conn_zone 40;

# Login and password reset endpoints (strict)
location = /login {
    limit_req zone=siinv_auth_zone burst=12 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location = /forgot-password {
    limit_req zone=siinv_auth_zone burst=6 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location = /verify-otp {
    limit_req zone=siinv_auth_zone burst=10 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location = /reset-password {
    limit_req zone=siinv_auth_zone burst=10 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

# API endpoints (kasir traffic still allowed but controlled)
location ^~ /api/ {
    limit_req zone=siinv_api_zone burst=180 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

