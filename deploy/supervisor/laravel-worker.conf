[program:siinv-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/siinv-kebab-sk/artisan queue:work database --queue=exports,default --sleep=2 --tries=3 --timeout=120 --max-time=3600 --memory=256
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=2
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/siinv-kebab-sk/storage/logs/worker.log
stopwaitsecs=360

